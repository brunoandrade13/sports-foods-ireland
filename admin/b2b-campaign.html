<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2B Campaign – SFI Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
         background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .topbar { background: #1B4332; padding: 14px 28px; display: flex;
            align-items: center; justify-content: space-between; }
  .topbar a { color: #6ee7b7; font-size: .85rem; text-decoration: none; }
  .topbar h1 { font-size: 1.1rem; color: #fff; }
  .page { max-width: 820px; margin: 0 auto; padding: 36px 24px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px;
          padding: 28px; margin-bottom: 24px; }
  .card h2 { font-size: 1rem; color: #4ade80; margin-bottom: 18px;
             padding-bottom: 10px; border-bottom: 1px solid #334155; }
  .stat-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat { background: #0f172a; border: 1px solid #334155; border-radius: 8px;
          padding: 14px 22px; text-align: center; flex: 1; min-width: 110px; }
  .stat .n { font-size: 1.8rem; font-weight: 700; color: #4ade80; }
  .stat .l { font-size: .72rem; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
  button { padding: 10px 22px; border: none; border-radius: 8px;
           font-size: .9rem; font-weight: 600; cursor: pointer; transition: .15s; }
  .btn-green { background: #169B62; color: #fff; }
  .btn-green:hover { background: #0f7a4d; }
  .btn-green:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
  .btn-ghost { background: #334155; color: #e2e8f0; }
  .btn-ghost:hover { background: #475569; }
  .btn-danger { background: #991b1b; color: #fecaca; }
  .btn-danger:hover { background: #7f1d1d; }
  .row-btns { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  label { font-size: .82rem; color: #94a3b8; display: block; margin-bottom: 4px; }
  input[type=number] { background: #0f172a; border: 1px solid #334155; border-radius: 6px;
                       color: #e2e8f0; padding: 8px 12px; font-size: .9rem; width: 90px; }
  .progress-wrap { background: #0f172a; border-radius: 8px; height: 10px;
                   overflow: hidden; margin: 10px 0 4px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #169B62, #4ade80);
                  border-radius: 8px; transition: width .4s; }
  .log { background: #020617; border: 1px solid #1e293b; border-radius: 8px;
         padding: 14px; max-height: 320px; overflow-y: auto; font-family: monospace;
         font-size: .78rem; color: #94a3b8; }
  .log p { margin-bottom: 3px; }
  .log .ok  { color: #4ade80; }
  .log .err { color: #f87171; }
  .log .inf { color: #60a5fa; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px;
           font-size: .7rem; font-weight: 700; }
  .badge.idle    { background: #334155; color: #94a3b8; }
  .badge.running { background: #1d4ed8; color: #bfdbfe; }
  .badge.done    { background: #166534; color: #bbf7d0; }
  .badge.error   { background: #991b1b; color: #fecaca; }
  #preview-box { margin-top: 14px; font-size: .82rem; color: #94a3b8; }
  .preview-email { background: #0f172a; border: 1px solid #1e293b; border-radius: 6px;
                   padding: 10px 14px; margin: 4px 0; font-size: .8rem; }
</style>
</head>
<body>

<div class="topbar">
  <a href="/admin/">← Admin</a>
  <h1>📧 B2B Portal Campaign</h1>
  <span class="badge idle" id="status-badge">Idle</span>
</div>

<div class="page">

  <!-- INFO CARD -->
  <div class="card">
    <h2>📊 Campaign Overview</h2>
    <div class="stat-row">
      <div class="stat"><div class="n" id="stat-total">–</div><div class="l">Eligible</div></div>
      <div class="stat"><div class="n" id="stat-sent" style="color:#60a5fa;">0</div><div class="l">Sent</div></div>
      <div class="stat"><div class="n" id="stat-errors" style="color:#f87171;">0</div><div class="l">Errors</div></div>
      <div class="stat"><div class="n" id="stat-remain" style="color:#fbbf24;">–</div><div class="l">Remaining</div></div>
    </div>

    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:.8rem;color:#64748b;">Progress</span>
        <span style="font-size:.8rem;color:#94a3b8;" id="pct-label">0%</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    </div>

    <div class="row-btns">
      <button class="btn-ghost" onclick="loadPreview()" id="btn-preview">🔍 Preview Audience</button>
      <div>
        <label>Batch size</label>
        <input type="number" id="batch-size" value="5" min="1" max="20">
      </div>
      <button class="btn-green" onclick="startCampaign()" id="btn-start">🚀 Start Campaign</button>
      <button class="btn-danger" onclick="stopCampaign()" id="btn-stop" style="display:none;">⏹ Stop</button>
    </div>

    <div id="preview-box"></div>
  </div>

  <!-- EMAIL PREVIEW CARD -->
  <div class="card">
    <h2>✉️ Email Preview</h2>
    <p style="font-size:.82rem;color:#94a3b8;margin-bottom:12px;">
      Subject: <strong style="color:#e2e8f0;">Access your SFI B2B Wholesale Portal</strong>
    </p>
    <iframe id="email-preview-frame"
      srcdoc=""
      style="width:100%;height:440px;border:1px solid #334155;border-radius:8px;background:#fff;"
    ></iframe>
    <p style="font-size:.75rem;color:#475569;margin-top:8px;">
      Banner: <code style="color:#fbbf24;">email-assets/banner-email-b2b.png</code> (Supabase Storage)
    </p>
  </div>

  <!-- LOG CARD -->
  <div class="card">
    <h2>📋 Send Log</h2>
    <div class="log" id="log"><p class="inf">Waiting to start...</p></div>
  </div>

</div>

<script>
const SUPABASE_URL   = 'https://styynhgzrkyoioqjssuw.supabase.co';
const CAMPAIGN_FN    = `${SUPABASE_URL}/functions/v1/b2b-campaign`;
const BANNER_URL     = `${SUPABASE_URL}/storage/v1/object/public/email-assets/banner-email-b2b.png`;

let totalCount   = 0;
let totalSent    = 0;
let totalErrors  = 0;
let running      = false;
let stopRequested = false;

// ── helpers ─────────────────────────────────────────────────────────────────
function setBadge(state) {
  const b = document.getElementById('status-badge');
  b.className = `badge ${state}`;
  b.textContent = { idle:'Idle', running:'Running', done:'Done', error:'Error' }[state] || state;
}
function log(msg, cls='') {
  const el = document.getElementById('log');
  const p = document.createElement('p');
  p.className = cls;
  p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(p);
  el.scrollTop = el.scrollHeight;
}
function updateStats() {
  document.getElementById('stat-sent').textContent   = totalSent;
  document.getElementById('stat-errors').textContent = totalErrors;
  const remain = Math.max(0, totalCount - totalSent - totalErrors);
  document.getElementById('stat-remain').textContent = totalCount ? remain : '–';
  if (totalCount) {
    const pct = Math.round(((totalSent + totalErrors) / totalCount) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('pct-label').textContent = pct + '%';
  }
}

// ── preview ──────────────────────────────────────────────────────────────────
async function loadPreview() {
  document.getElementById('btn-preview').disabled = true;
  document.getElementById('preview-box').innerHTML = '<p style="color:#64748b;font-size:.82rem;margin-top:10px;">Loading…</p>';
  try {
    const r = await fetch(CAMPAIGN_FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'preview' })
    });
    const d = await r.json();
    totalCount = d.total || 0;
    document.getElementById('stat-total').textContent = totalCount;
    updateStats();

    let html = `<p style="margin-top:12px;color:#4ade80;font-size:.85rem;font-weight:600;">✅ ${totalCount} eligible B2B customers found</p>
      <p style="color:#64748b;font-size:.78rem;margin:6px 0 10px;">Sample (first 5):</p>`;
    (d.sample || []).forEach(c => {
      html += `<div class="preview-email">${c.company_name || `${c.first_name||''} ${c.last_name||''}`.trim() || c.email} &lt;${c.email}&gt;</div>`;
    });
    document.getElementById('preview-box').innerHTML = html;
  } catch(e) {
    document.getElementById('preview-box').innerHTML = `<p style="color:#f87171;font-size:.82rem;margin-top:10px;">Error: ${e.message}</p>`;
  }
  document.getElementById('btn-preview').disabled = false;
}

// ── campaign ──────────────────────────────────────────────────────────────────
async function startCampaign() {
  if (running) return;
  if (!totalCount) { await loadPreview(); }
  if (!confirm(`Send emails to ${totalCount} B2B customers?\n\nSubject: "Access your SFI B2B Wholesale Portal"`)) return;

  running      = true;
  stopRequested = false;
  totalSent    = 0;
  totalErrors  = 0;
  document.getElementById('log').innerHTML = '';
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').style.display = '';
  setBadge('running');

  const batchSize = parseInt(document.getElementById('batch-size').value) || 5;
  let offset = 0;

  log(`Starting campaign: ${totalCount} customers, batch size ${batchSize}`, 'inf');

  while (!stopRequested) {
    try {
      const r = await fetch(CAMPAIGN_FN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'send_batch', batch_size: batchSize, offset })
      });
      const d = await r.json();

      if (!r.ok) {
        log(`Batch error: ${JSON.stringify(d)}`, 'err');
        break;
      }

      (d.results || []).forEach(res => {
        if (res.status === 'sent') {
          totalSent++;
          log(`✓ ${res.email}`, 'ok');
        } else {
          totalErrors++;
          log(`✗ ${res.email}: ${res.error}`, 'err');
        }
      });

      offset += batchSize;
      updateStats();

      if (d.done || offset >= totalCount) {
        log(`Campaign complete. Sent: ${totalSent}, Errors: ${totalErrors}`, 'inf');
        setBadge('done');
        break;
      }

      // 500ms pause between batches
      await new Promise(res => setTimeout(res, 500));

    } catch(e) {
      log(`Fatal error: ${e.message}`, 'err');
      setBadge('error');
      break;
    }
  }

  if (stopRequested) {
    log('Campaign stopped by user.', 'inf');
    setBadge('idle');
  }

  running = false;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').style.display = 'none';
}

function stopCampaign() {
  stopRequested = true;
  log('Stop requested…', 'inf');
}

// ── email preview ─────────────────────────────────────────────────────────────
document.getElementById('email-preview-frame').srcdoc = `<!DOCTYPE html>
<html><body style="margin:0;padding:0;background:#f1f5f9;font-family:Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:24px 0;">
  <tr><td align="center">
    <table width="520" cellpadding="0" cellspacing="0" style="max-width:520px;background:#fff;border-radius:10px;overflow:hidden;">
      <tr><td style="padding:0;">
        <img src="${BANNER_URL}" width="520" alt="SFI Banner" style="display:block;width:100%;">
      </td></tr>
      <tr><td style="padding:28px 32px 20px;">
        <p style="margin:0 0 10px;font-size:.95rem;color:#1e293b;">Hi <strong>Run Hub Wholesale</strong>,</p>
        <p style="margin:0 0 14px;font-size:.9rem;color:#334155;line-height:1.6;">Your <strong>Sports Foods Ireland B2B Wholesale Portal</strong> is live and ready for you.</p>
        <p style="margin:0 0 22px;font-size:.9rem;color:#334155;line-height:1.6;">Set up your password to access exclusive wholesale pricing, place orders and track your account — all in one place.</p>
        <table cellpadding="0" cellspacing="0" style="margin:0 auto 22px;"><tr>
          <td style="border-radius:8px;background:#169B62;">
            <a href="#" style="display:inline-block;padding:13px 36px;color:#fff;font-size:.95rem;font-weight:700;text-decoration:none;">Set My Password &amp; Sign In →</a>
          </td></tr></table>
        <p style="margin:0;font-size:.75rem;color:#94a3b8;">This link expires in <strong>24 hours</strong>.</p>
      </td></tr>
      <tr><td style="background:#1B4332;padding:16px;text-align:center;">
        <p style="margin:0;color:#6ee7b7;font-size:.75rem;">Sports Foods Ireland Ltd · Dublin 15</p>
      </td></tr>
    </table>
  </td></tr>
</table></body></html>`;

// Auto-load preview on page open
loadPreview();
</script>
</body>
</html>
